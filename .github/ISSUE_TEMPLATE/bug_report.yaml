---
name: Bug Report
description: Report a bug in django-openflights
labels: ["type: bug", "status: needs triage"]
body:
  - type: input
    attributes:
      label: django-openflights version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    attributes:
      label: Django version
      placeholder: 5.0
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Python version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Component
      options:
        - Import (airports)
        - Import (airlines)
        - Import (routes)
        - Import (planes)
        - Models/Queries
        - Other
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run: python manage.py openflights --import=all
        2. Observe error...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Observed Behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Traceback
      render: shell
